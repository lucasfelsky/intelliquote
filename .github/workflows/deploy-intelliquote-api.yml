# Deploy do backend IntelliQuote (r46) para o Cloud Run.
#
# Esse workflow NAO depende de `gcloud` ou Docker local: usa Cloud Build
# oficial e ja autentica via Workload Identity Federation.
#
# Gatilhos:
#   - manual (workflow_dispatch) com campo `tag` (ex: r46-20260619)
#   - push de tag no formato `backend-v*` (ex: backend-v46)
#
# Pre-requisitos no GitHub (secrets):
#   - GCP_WORKLOAD_IDENTITY_PROVIDER  (resource name do WIF provider, ex.:
#     projects/705697815580/locations/global/workloadIdentityPools/github-pool/providers/github-provider)
#   - GCP_SERVICE_ACCOUNT              (email da SA com permissoes de deploy, ex.:
#     github-actions-deployer@PROJECT.iam.gserviceaccount.com)
# Variaveis (Settings > Variables):
#   - GCP_PROJECT_ID, GCP_REGION, GCP_ARTIFACT_REPO, GCP_CLOUD_RUN_SERVICE.
# Nenhum segredo de aplicacao fica no GitHub: os valores sao lidos direto do
# GCP Secret Manager via `--set-secrets` (mesmo modelo do deploy manual via
# `deploy-cloudrun.ps1`). Os secrets precisam existir no projeto com estes nomes
# exatos: DATABASE_URL, DIRECT_URL, FIREBASE_SERVICE_ACCOUNT_JSON, JWT_ACCESS_SECRET, JWT_REFRESH_SECRET, SMTP_FROM, SMTP_HOST, SMTP_PASS, SMTP_PORT, SMTP_USER.
#
# Pre-requisitos no GCP:
#   - Cloud Build API + Cloud Run API habilitadas
#   - Artifact Registry com o repo `intelliquote` na regiao
#   - Service account com roles: Cloud Run Admin, Cloud Build Editor,
#     Artifact Registry Writer, Service Account User (no default
#     compute SA do Cloud Run).
#   - WIF pool + provider configurados para o repo.

name: Deploy backend (Cloud Run)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da imagem (ex: r46-20260619). Padrao: latest."
        required: false
        default: "latest"
      backend_build_tag:
        description: "Valor de BACKEND_BUILD_TAG (ex: 2026-06-19-r46-catalog-items-admin). Padrao: igual a tag."
        required: false
        default: ""
  push:
    tags:
      - "backend-v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-intelliquote-api
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_ARTIFACT_REPO: ${{ vars.GCP_ARTIFACT_REPO }}
  GCP_CLOUD_RUN_SERVICE: ${{ vars.GCP_CLOUD_RUN_SERVICE }}

# Variáveis e secrets do GitHub às vezes vêm com whitespace acidental;
# normaliza no inicio do job para não dar "invalid project id".
jobs:
  build-and-deploy:
    name: Build (Cloud Build) + Deploy (Cloud Run)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trim de variáveis (defesa contra whitespace)
        shell: bash
        run: |
          printf '%s\n' "GCP_PROJECT_ID=${GCP_PROJECT_ID// /}" >> "$GITHUB_ENV"
          printf '%s\n' "GCP_REGION=${GCP_REGION// /}" >> "$GITHUB_ENV"
          printf '%s\n' "GCP_ARTIFACT_REPO=${GCP_ARTIFACT_REPO// /}" >> "$GITHUB_ENV"
          printf '%s\n' "GCP_CLOUD_RUN_SERVICE=${GCP_CLOUD_RUN_SERVICE// /}" >> "$GITHUB_ENV"
          echo "Trimmed envs:"
          env | grep '^GCP_'

      - name: Resolver tag e build tag
        id: tags
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            REF="${GITHUB_REF_NAME}"
            echo "image_tag=${REF#backend-v}" >> "$GITHUB_OUTPUT"
            echo "backend_build_tag=${REF#backend-v}" >> "$GITHUB_OUTPUT"
          else
            IMAGE_TAG="${{ inputs.tag }}"
            BACKEND_BUILD_TAG="${{ inputs.backend_build_tag }}"
            if [ -z "$BACKEND_BUILD_TAG" ]; then
              BACKEND_BUILD_TAG="$IMAGE_TAG"
            fi
            echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
            echo "backend_build_tag=${BACKEND_BUILD_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Autenticar no Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Setup gcloud (Cloud Build ja autenticado)
        uses: google-github-actions/setup-gcloud@v2
        env:
          CLOUDSDK_AUTH_TOKEN: ${{ steps.auth.outputs.access_token }}
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Disparar build remoto (Cloud Build)
        id: build
        shell: bash
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REPO}/${GCP_CLOUD_RUN_SERVICE}:${{ steps.tags.outputs.image_tag }}"
          echo "Building ${IMAGE}"
          gcloud builds submit \
            --project="${GCP_PROJECT_ID}" \
            --config=programa/cloudbuild.yaml \
            --substitutions="_REGION=${GCP_REGION},_SERVICE=${GCP_CLOUD_RUN_SERVICE},_REPOSITORY=${GCP_ARTIFACT_REPO},_TAG=${{ steps.tags.outputs.image_tag }}" \
            --quiet
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Deploy no Cloud Run
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ steps.build.outputs.image }}"
          SERVICE="${{ env.GCP_CLOUD_RUN_SERVICE }}"
          REGION="${{ env.GCP_REGION }}"
          PROJECT="${{ env.GCP_PROJECT_ID }}"
          BUILD_TAG="${{ steps.tags.outputs.backend_build_tag }}"

          echo "Deploying ${IMAGE} to ${SERVICE} (${REGION})"

          # Envs "nao-secret" vao inline via --set-env-vars (mesmo modelo do
          # deploy-env-vars.yaml que o deploy manual usa). Segredos vao via
          # --set-secrets lendo do GCP Secret Manager (mesmo modelo do
          # deploy-cloudrun.ps1) — assim nenhum valor sensivel toca o GitHub.
          ENV_VARS="NODE_ENV=production"
          ENV_VARS="${ENV_VARS},CORS_ORIGINS=https://intelliquote.portal-comex.com,https://intelliquote.web.app,https://intelliquote--intelliquote-5qf1ezu3.web.app,http://localhost:3000,http://127.0.0.1:3000"
          ENV_VARS="${ENV_VARS},INTELLIQUOTE_PORTAL_URL=https://intelliquote.portal-comex.com"
          ENV_VARS="${ENV_VARS},MAILER_PROVIDER=smtp"
          ENV_VARS="${ENV_VARS},SMTP_SECURE=false"
          ENV_VARS="${ENV_VARS},JWT_ACCESS_EXPIRES_IN=15m"
          ENV_VARS="${ENV_VARS},JWT_REFRESH_EXPIRES_IN=7d"
          ENV_VARS="${ENV_VARS},COOKIE_SECURE=true"
          ENV_VARS="${ENV_VARS},PORT=8080"
          ENV_VARS="${ENV_VARS},BACKEND_BUILD_TAG=${BUILD_TAG}"

          SECRET_REFS="SMTP_PASS=SMTP_PASS:latest"
          SECRET_REFS="${SECRET_REFS},SMTP_HOST=SMTP_HOST:latest"
          SECRET_REFS="${SECRET_REFS},SMTP_USER=SMTP_USER:latest"
          SECRET_REFS="${SECRET_REFS},SMTP_PORT=SMTP_PORT:latest"
          SECRET_REFS="${SECRET_REFS},SMTP_FROM=SMTP_FROM:latest"
          SECRET_REFS="${SECRET_REFS},DATABASE_URL=DATABASE_URL:latest"
          SECRET_REFS="${SECRET_REFS},DIRECT_URL=DIRECT_URL:latest"
          SECRET_REFS="${SECRET_REFS},JWT_ACCESS_SECRET=JWT_ACCESS_SECRET:latest"
          SECRET_REFS="${SECRET_REFS},JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest"
          SECRET_REFS="${SECRET_REFS},FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest"

          gcloud run deploy "${SERVICE}" \
            --project="${PROJECT}" \
            --region="${REGION}" \
            --image="${IMAGE}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --timeout=300 \
            --set-env-vars="${ENV_VARS}" \
            --set-secrets="${SECRET_REFS}" \
            --quiet
          URL=$(gcloud run services describe "${SERVICE}" \
            --project="${PROJECT}" \
            --region="${REGION}" \
            --format='value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Service URL: ${URL}"

      - name: Smoke test (health + catalogo)
        if: success()
        shell: bash
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "Health check em ${URL}/health/ready"
          HTTP=$(curl -s -o /tmp/h.json -w '%{http_code}' "${URL}/health/ready" || true)
          cat /tmp/h.json
          echo
          if [ "$HTTP" != "200" ]; then
            echo "::error::Backend health check falhou (HTTP ${HTTP})"
            exit 1
          fi
          echo "GET ${URL}/api/v1/catalog-items?pageSize=1 (esperado 401 sem auth, NAO 404)"
          HTTP2=$(curl -s -o /tmp/c.json -w '%{http_code}' "${URL}/api/v1/catalog-items?pageSize=1" || true)
          cat /tmp/c.json
          echo
          if [ "$HTTP2" = "404" ]; then
            echo "::error::Endpoint /api/v1/catalog-items nao registrado (HTTP 404)."
            exit 1
          fi
