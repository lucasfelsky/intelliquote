name: CI

# Workflow de integracao continua do IntelliQuote.
# - Vitest unit (87 casos + 1 skip)
# - tsc build do backend
# - Vite build do web
# - Playwright E2E com Postgres 16 + MailHog como services
# - Upload de programa/dist/ + programa/web/dist/ como artifacts (10 dias)
# - Upload de playwright-report/ em caso de falha (7 dias)
#
# Cache: setup-node@4 com cache='npm' ja' cuida do cache de ~/.npm
# baseado em programa/package-lock.json. Nao precisa de action/cache separado.
#
# Secrets necessarios (configurar em Settings > Secrets and variables > Actions):
#   FIREBASE_TOKEN  - token `firebase login:ci` (so usado em deploy; este workflow nao faz deploy)

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, develop]

# Cancela runs anteriores da mesma branch (economiza minutos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-build:
    name: Unit + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            programa/package-lock.json
            programa/web/package-lock.json

      - name: Install
        working-directory: programa
        run: npm ci

      - name: Prisma generate
        working-directory: programa
        run: npx prisma generate

      - name: Unit tests (Vitest)
        working-directory: programa
        run: npm test

      - name: Build backend (tsc)
        working-directory: programa
        run: npm run build

      - name: Install web deps
        working-directory: programa/web
        run: npm ci

      - name: Build web (Vite)
        working-directory: programa/web
        run: npm run build

      - name: Upload backend dist/ artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: intelliquote-backend-dist
          path: programa/dist/
          retention-days: 10
          if-no-files-found: error

      - name: Upload web dist/ artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: intelliquote-web-dist
          path: programa/web/dist/
          retention-days: 10
          if-no-files-found: error

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: unit-and-build
    # Services abaixo: Postgres 16 (Prisma) e MailHog (SMTP dev).
    # O webServer do playwright.config.ts sobe `npm run dev` no :3000 e
    # aponta para esses services via env vars.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: intelliquote_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      mailhog:
        image: mailhog/mailhog:latest
        ports:
          - 1025:1025
          - 8025:8025
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/intelliquote_test?schema=public'
      # MailHog SMTP (sem TLS)
      SMTP_HOST: localhost
      SMTP_PORT: '1025'
      SMTP_USER: ''
      SMTP_PASS: ''
      SMTP_FROM: 'ci@sqquimica.com'
      # Auth/portal config minima para o backend subir
      CORS_ORIGINS: 'http://localhost:3000,http://localhost:5174'
      JWT_ACCESS_SECRET: 'ci-access-secret-32-chars-min'
      JWT_REFRESH_SECRET: 'ci-refresh-secret-32-chars-min'
      APP_PUBLIC_URL: 'http://localhost:3000'
      BCB_PTAX_URL: 'https://olinda.bcb.gov.br/olinda/servico/PTAX/versao/v1/odata'
      LOG_LEVEL: 'error'
      NODE_ENV: 'test'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'programa/package-lock.json'

      - name: Install
        working-directory: programa
        run: npm ci

      - name: Prisma generate
        working-directory: programa
        run: npx prisma generate

      - name: Prisma migrate (cria schema no Postgres do CI)
        working-directory: programa
        run: npx prisma migrate deploy

      - name: Prisma seed
        working-directory: programa
        run: npm run prisma:seed

      - name: Install Playwright browser
        working-directory: programa
        run: npx playwright install --with-deps chromium

      - name: Roda Playwright
        working-directory: programa
        # Removendo .skip temporariamente nao e' trivial; os 2 specs skipped
        # continuam skipped. Os 8 smoke tests (auth + portal) rodam.
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: programa/playwright-report/
          retention-days: 7
