# Deploy do frontend IntelliQuote (programa/web) para o Firebase Hosting
# (site `intelliquote`, projeto sq-comex-updates-3d22f).
#
# Motivação: o deploy do frontend era 100% manual (`npm run deploy:intelliquote`
# no repo Portal COMEX) e já causou prod defasado — PR mergeado na main com o
# hosting servindo build antigo. Este workflow espelha o modelo do backend
# (`deploy-intelliquote-api.yml`): gate por tag + WIF, sem chave persistente.
#
# Gatilhos:
#   - push de tag no formato `web-v*` (ex: web-v54-20260711)
#   - manual (workflow_dispatch)
#
# Auth: Workload Identity Federation — MESMOS secrets do deploy do backend
# (GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT). O hosting vive no
# mesmo projeto GCP do Cloud Run (vars.GCP_PROJECT_ID), então a SA só precisa
# do role adicional `roles/firebasehosting.admin`. O `google-github-actions/auth`
# exporta GOOGLE_APPLICATION_CREDENTIALS, que o firebase-tools honra (ADC).
#
# Build-time secrets (config pública do SDK web — vai no bundle):
#   VITE_FIREBASE_API_KEY, VITE_FIREBASE_AUTH_DOMAIN, VITE_FIREBASE_PROJECT_ID,
#   VITE_FIREBASE_STORAGE_BUCKET, VITE_FIREBASE_MESSAGING_SENDER_ID,
#   VITE_FIREBASE_APP_ID, VITE_INTELLIQUOTE_API_BASE, VITE_PORTAL_URL.

name: Deploy frontend (Firebase Hosting)

on:
  push:
    tags:
      - "web-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-intelliquote-web
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

jobs:
  build-and-deploy:
    name: Build + Deploy web to Firebase Hosting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: programa/web/package-lock.json

      - name: Validar config de build (VITE_*)
        run: |
          missing=0
          for v in VITE_FIREBASE_API_KEY VITE_FIREBASE_AUTH_DOMAIN VITE_FIREBASE_PROJECT_ID VITE_FIREBASE_STORAGE_BUCKET VITE_FIREBASE_MESSAGING_SENDER_ID VITE_FIREBASE_APP_ID VITE_INTELLIQUOTE_API_BASE VITE_PORTAL_URL; do
            val=$(printenv "$v" || true)
            if [ -z "$val" ]; then
              echo "::error::Secret ausente: $v"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Config de build incompleta — adicione os secrets VITE_* no repo (Settings > Secrets and variables > Actions)."
            exit 1
          fi
          echo "Config de build OK."
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_INTELLIQUOTE_API_BASE: ${{ secrets.VITE_INTELLIQUOTE_API_BASE }}
          VITE_PORTAL_URL: ${{ secrets.VITE_PORTAL_URL }}

      - name: Install (programa/web)
        working-directory: programa/web
        run: npm ci

      - name: Build (tsc --noEmit + vite build)
        working-directory: programa/web
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_INTELLIQUOTE_API_BASE: ${{ secrets.VITE_INTELLIQUOTE_API_BASE }}
          VITE_PORTAL_URL: ${{ secrets.VITE_PORTAL_URL }}
        run: npm run build

      - name: Autenticar no Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting (site intelliquote)
        run: |
          set +e
          npx firebase-tools@latest deploy --only hosting \
            --config firebase.intelliquote.json \
            --project "$GCP_PROJECT_ID" > deploy.log 2>&1
          code=$?
          cat deploy.log
          if [ "$code" -ne 0 ]; then
            # HTTP 400 "is the current active version" = build identico ao ativo
            # em producao (nada a publicar). Tratar como sucesso.
            if grep -q "is the current active version" deploy.log; then
              echo "::notice::Versao de hosting identica a ativa em producao — nada a publicar."
              exit 0
            fi
            exit "$code"
          fi

      - name: Smoke test (hosting responde com o SPA)
        run: |
          for i in 1 2 3; do
            status=$(curl -s -o /tmp/index.html -w "%{http_code}" https://intelliquote.web.app/)
            if [ "$status" = "200" ] && grep -qi "<div id=\"root\"" /tmp/index.html; then
              echo "Smoke OK (HTTP $status, SPA root presente)."
              exit 0
            fi
            echo "Tentativa $i falhou (HTTP $status). Retry em 10s..."
            sleep 10
          done
          echo "::error::Smoke test falhou: hosting nao respondeu 200 com o SPA."
          exit 1
